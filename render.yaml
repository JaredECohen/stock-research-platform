databases:
  - name: marketmosaic-db
    plan: basic-256mb
    databaseName: marketmosaic
    user: marketmosaic
    postgresMajorVersion: "16"

services:
  - type: web
    name: marketmosaic
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Bumped from `starter` (0.5 CPU, 512MB RAM, $7/mo) to `standard`
    # (1 CPU, 2GB RAM, $25/mo). Memo regen on the expanded SP500-ish
    # universe routinely OOM-killed the worker mid-task: 26+ LLM calls,
    # full filing-body cache (~250KB × 10 filings/ticker), and
    # vector_store loading all chunk embeddings (1536 floats each)
    # into Python for cosine similarity, plus the universe seed in
    # memory, blew past 512MB. SIGKILL bypasses Python, so failures
    # were invisible: in-memory _REGEN_JOBS / _REGEN_FAILURES vanished
    # with the process, no exception ever fired through the try/except
    # in _run_regen_job. 4× the RAM resolves it.
    plan: standard
    healthCheckPath: /health
    autoDeploy: true
    domains:
      - marketmosaic.ai
      - www.marketmosaic.ai
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketmosaic-db
          property: connectionString

      - key: APP_ENV
        value: production
      - key: USE_DEMO_DATA
        value: "false"
      - key: BACKEND_HOST
        value: 0.0.0.0
      - key: BACKEND_PORT
        value: "8000"
      - key: PORT
        value: "8000"
      - key: FRONTEND_URL
        value: https://marketmosaic.ai
      - key: CORS_ORIGINS
        value: https://marketmosaic.ai,https://www.marketmosaic.ai

      # Production-mode toggles (Wave 9b).
      # Nightly cron jobs: history backfill (03:15 UTC), EDGAR poller,
      # outcome tracking, LLM-log GC. Without this, memos go stale and
      # the screener stops auto-refreshing.
      - key: ENABLE_MONITORING
        value: "true"
      # Per-IP rate limits on /api/chat, /api/stocks/*/memo,
      # /api/stocks/*/analyze, /api/screener/custom, /api/seed-universe,
      # /api/admin/run-backfill. In-memory store is fine for one
      # replica; set RATE_LIMIT_STORAGE_URL=redis://… when scaling out.
      - key: RATE_LIMIT_ENABLED
        value: "true"
      # Long-term agent memory writes to memory/companies/<TICKER>.md.
      # Render's container disk is ephemeral — disable by default to
      # avoid silently losing entries on every redeploy. Set "true"
      # only after mounting a persistent disk for memory/.
      - key: ENABLE_LONG_TERM_MEMORY
        value: "false"

      # Secrets — set values in the Render dashboard, not in this file.
      - key: SEC_USER_AGENT
        sync: false
      - key: FMP_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: POLYGON_API_KEY
        sync: false
      - key: TIINGO_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
